# Template workflow for Sentinel tests
# This file contains the shared configuration and steps for both ZTF and Rubin surveys

name: Sentinel Template

# This is a template - it should not be triggered directly
# Copy this template to create specific workflows for each survey

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Template job configuration
# Replace SURVEY_NAME and IMAGE_SUFFIX in specific workflows
jobs:
  test-SURVEY_NAME:
    runs-on: ubuntu-latest

    container:
      image: gitlab-registry.in2p3.fr/astrolabsoftware/fink/fink-deps-sentinel-IMAGE_SUFFIX:v2.52.0-74-g11c8ea9

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
    - name: Check env DEBUG
      run: |
        env
    - uses: actions/checkout@v4

    - name: Download simulator
      run: |
        pwd
        git clone https://github.com/astrolabsoftware/fink-alert-simulator.git
    - name: Download schemas
      run: |
        git clone --depth 1 --branch v0.0.2-rc0 https://github.com/astrolabsoftware/fink-alert-schemas.git

        # for the test suite
        cp -r fink-alert-schemas/datasim .
    - name: Set up env
      run: |
        export FINK_HOME=$GITHUB_WORKSPACE
        export FINK_ALERT_SIMULATOR=${FINK_HOME}/fink-alert-simulator/rootfs/fink
        echo "FINK_HOME=$FINK_HOME" >> $GITHUB_ENV
        echo "FINK_ALERT_SIMULATOR=$FINK_ALERT_SIMULATOR" >> $GITHUB_ENV
        echo "FINK_SCHEMA=${FINK_HOME}/fink-alert-schemas" >> $GITHUB_ENV
        echo "PYTHONPATH=${FINK_HOME}:${FINK_ALERT_SIMULATOR}:${PYTHONPATH}" >> $GITHUB_ENV
        # TODO test if needed
        echo "KAFKA_OPTS=-Djava.net.preferIPv4Stack=True" >> $GITHUB_ENV
        echo "${FINK_HOME}/bin:${FINK_ALERT_SIMULATOR}/bin" >> $GITHUB_PATH
    - name: Check env
      run: |
        echo "PATH: $PATH"
        echo "FINK_HOME: $FINK_HOME"
        echo "SPARK_HOME: $SPARK_HOME"
        echo "SPARKLIB: $SPARKLIB"
        echo "FINK_ALERT_SIMULATOR: $FINK_ALERT_SIMULATOR"
        echo "FINK_SCHEMA: $FINK_SCHEMA"
        echo "KAFKA_HOME: $KAFKA_HOME"
        echo "PYTHONPATH: $PYTHONPATH"
        echo "JAVA_HOME: $JAVA_HOME"
        echo `python -V`
    - name: Start services
      run: |
        ${FINK_BROKER_ROOT}/sentinel/start_services.sh
    # Replace with specific test command for each survey
    - name: Run SURVEY_NAME test suite
      run: |
        # REPLACE_WITH_SURVEY_SPECIFIC_COMMANDS
    - uses: actions/upload-artifact@v4
      with:
        name: logs-SURVEY_NAME
        path: broker_logs
        retention-days: 7
        overwrite: true
      if: always()
    - uses: act10ns/slack@v1
      with:
        status: ${{ job.status }}
      if: always()