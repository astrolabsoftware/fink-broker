name: "Reusable workflow for Fink self-hosted e2e tests"
on:
  workflow_call:
    inputs:
      suffix:
        required: true
        type: string
      runner:
        required: true
        type: string
      kind_version:
        description: 'Kind version to use'
        required: false
        type: string
        default: "v0.20.0"
    secrets:
      registry_username:
        required: true
      registry_token:
        required: true
      slack_webhook_url:
        required: true
env:
  CIUX_VERSION: v0.0.7-rc1
  GHA_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  SUFFIX: ${{ inputs.suffix }}
  MONITORING_OPT: "-m"
  # Override the self-hosted runner value
  POD_NAMESPACE: default
  IS_SELF_HOSTED: ${{ contains(fromJSON(inputs.runner), 'self-hosted') }}
jobs:
  build:
    name: Build image
    runs-on: ${{ fromJSON(inputs.runner) }}
    outputs:
      ciux_image_url: ${{ steps.export.outputs.CIUX_IMAGE_URL }}
      ciux_build: ${{ steps.export.outputs.CIUX_BUILD }}
      skip_artifacts: ${{ contains(fromJSON(inputs.runner), 'self-hosted') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21.4'
      - name: Install ciux
        run: go install github.com/k8s-school/ciux@"${{ env.CIUX_VERSION }}"
      - name: Build fink-broker image for k8s
        run: |
          mkdir -p $HOME/.ciux
          ./build.sh -s "${{ env.SUFFIX }}"
      - name: Export fink-broker image
        id: export
        run: |
          # Cannot use CIUXCONFIG because it may not have been created yet
          $(ciux get image --check $PWD --suffix "${{ env.SUFFIX }}" --env)
          if [ $CIUX_BUILD = true ]; then
            if [ "${{ env.IS_SELF_HOSTED }}" = "true" ]; then
              # For self-hosted: image stays in local Docker registry for reuse
              echo "Image $CIUX_IMAGE_URL built and available in local Docker registry"
              docker images --filter reference="$CIUX_IMAGE_URL"
              echo "CIUX_IMAGE_URL=$CIUX_IMAGE_URL" >> "$GITHUB_OUTPUT"
            else
              # For GitHub runners: use artifacts
              mkdir -p artifacts
              echo "Export $CIUX_IMAGE_URL to Github artifact store"
              docker save "$CIUX_IMAGE_URL" > artifacts/image.tar
              echo "CIUX_IMAGE_URL=$CIUX_IMAGE_URL" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Using existing image $CIUX_IMAGE_URL"
            echo "CIUX_IMAGE_URL=$CIUX_IMAGE_URL" >> "$GITHUB_OUTPUT"
          fi
          echo "skip_artifacts=${{ contains(fromJSON(inputs.runner), 'self-hosted') }}" >> "$GITHUB_OUTPUT"
          echo "CIUX_BUILD=$CIUX_BUILD" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        if: ${{ !contains(fromJSON(inputs.runner), 'self-hosted') }}
        with:
          name: docker-artifact
          path: artifacts
  integration-tests:
    strategy:
      matrix:
        storage: [hdfs, s3]
    name: Run integration tests
    runs-on: ${{ fromJSON(inputs.runner) }}
    outputs:
      ciux_build: ${{ steps.promote.outputs.CIUX_BUILD }}
      ciux_promoted_image_url: ${{ steps.promote.outputs.CIUX_PROMOTED_IMAGE_URL }}
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Maximize build space
        if: ${{ !contains(fromJSON(inputs.runner), 'self-hosted') }}
        run: |
          echo "Removing unwanted software... "
          df -h
          sudo rm -rf /usr/share/dotnet
          df -h
          sudo rm -rf /usr/local/lib/android
          df -h
          sudo rm -rf /opt/ghc
          df -h
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h
          docker image prune --all --force
          df -h
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21.4'
      - name: Install ciux
        run: go install github.com/k8s-school/ciux@"${{ env.CIUX_VERSION }}"
      - name: Ciux project ignition
        run: |
          ciux ignite --selector itest --branch="$GHA_BRANCH_NAME" $PWD --suffix "${{ env.SUFFIX }}"
          ink "Ciux configuration file"
          cat .ciux.d/ciux_itest.sh
      - name: Boostrap k8s (kind) cluster
        run: |
          # v0.20.0 does not work on self-hosted runners
          ./e2e/prereq-install.sh -k "${{ inputs.kind_version }}" ${{ env.MONITORING_OPT}}

      - name: Download image
        uses: actions/download-artifact@v4
        if: ${{ !contains(fromJSON(inputs.runner), 'self-hosted') }}
        with:
          name: docker-artifact
          path: artifacts
      - name: Load container image inside kind
        run: |
          IMAGE_URL="${{ needs.build.outputs.ciux_image_url }}"
          CIUX_BUILD="${{ needs.build.outputs.ciux_build }}"

          if [ $CIUX_BUILD = true ]; then
            # Image was built locally - handle based on runner type
            if [ "${{ env.IS_SELF_HOSTED }}" = "true" ]; then
              # For self-hosted: verify image is available in local Docker registry
              if docker images --filter reference="$IMAGE_URL" --format "{{.Repository}}:{{.Tag}}" | grep -q "$IMAGE_URL"; then
                echo "Image $IMAGE_URL found in local Docker registry"
                docker images --filter reference="$IMAGE_URL"
              else
                echo "Error: image $IMAGE_URL not found in local Docker registry"
                echo "Available images:"
                docker images
                exit 1
              fi
            elif [ -f artifacts/image.tar ]; then
              echo "Loading image from archive"
              docker load --input artifacts/image.tar
            else
              echo "Error: no image source available, artifacts/image.tar not found"
              exit 1
            fi
          else
            echo "Using existing remote image $IMAGE_URL"
          fi

          # Load image into kind cluster
          cluster_name=$(ciux get clustername $PWD)
          kind load docker-image "$IMAGE_URL" --name "$cluster_name"
          node=$(kubectl get nodes --selector=node-role.kubernetes.io/control-plane -o jsonpath='{.items[0].metadata.name}')
          docker exec -- $node crictl image
          # - name: Setup tmate session
          # uses: mxschmitt/action-tmate@v3
          # with:
          # detached: true
      - name: Run argoCD
        run: |
          ./e2e/argocd.sh -s "${{ env.SUFFIX }}" -S "${{ matrix.storage }}" ${{ env.MONITORING_OPT}}
      - name: Check results
        run: |
          ./e2e/check-results.sh -s "${{ env.SUFFIX }}"
      - name: Delete cluster
        if: always()
        run: |
          cluster_name=$(ciux get clustername $PWD)
          kind delete cluster --name "$cluster_name"
      - name: Promote fink-broker image
        id: promote
        run: |
          . .ciux.d/ciux_itest.sh
          echo "CIUX_PROMOTED_IMAGE_URL=$CIUX_PROMOTED_IMAGE_URL" >> "$GITHUB_OUTPUT"
          echo "CIUX_BUILD=$CIUX_BUILD" >> "$GITHUB_OUTPUT"
  image-analysis:
    name: Analyze image
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      security-events: write
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Download image
        uses: actions/download-artifact@v4
        if: ${{ !contains(fromJSON(inputs.runner), 'self-hosted') }}
        with:
          name: docker-artifact
          path: artifacts
      - name: Load image in local registry
        run: |
          IMAGE_URL="${{ needs.build.outputs.ciux_image_url }}"
          CIUX_BUILD="${{ needs.build.outputs.ciux_build }}"

          if [ $CIUX_BUILD = true ]; then
            # Image was built locally - handle based on runner type
            if [ "${{ env.IS_SELF_HOSTED }}" = "true" ]; then
              # For self-hosted: verify image is available in local Docker registry
              if docker images --filter reference="$IMAGE_URL" --format "{{.Repository}}:{{.Tag}}" | grep -q "$IMAGE_URL"; then
                echo "Image $IMAGE_URL found in local Docker registry"
                docker images --filter reference="$IMAGE_URL"
              else
                echo "Error: image $IMAGE_URL not found in local Docker registry"
                echo "Available images:"
                docker images
                exit 1
              fi
            elif [ -f artifacts/image.tar ]; then
              echo "Loading image $IMAGE_URL from archive"
              docker load --input artifacts/image.tar
            else
              echo "Error: no image source available, artifacts/image.tar not found"
              exit 1
            fi
          else
            echo "Using existing remote image $IMAGE_URL"
          fi
      - name: Scan fink-broker image
        uses: anchore/scan-action@v6
        id: scan
        with:
          image: "${{ needs.build.outputs.ciux_image_url }}"
          fail-build: false
      - name: Display SARIF report
        run: |
          cat ${{ steps.scan.outputs.sarif }}
      - name: upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
  push:
    env:
      CIUX_BUILD: ${{ needs.build.outputs.ciux_build }}
      CIUX_IMAGE_URL: ${{ needs.build.outputs.ciux_image_url }}
      CIUX_PROMOTED_IMAGE_URL: ${{ needs.integration-tests.outputs.ciux_promoted_image_url }}
    name: Push fink-broker image to IN2P3 registry
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: [build, integration-tests]
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        if: ${{ !contains(fromJSON(inputs.runner), 'self-hosted') }}
        with:
          name: docker-artifact
          path: artifacts
      - name: Load image in local registry
        run: |
          if [ $CIUX_BUILD = true ]; then
            if [ "${{ env.IS_SELF_HOSTED }}" = "true" ]; then
              # For self-hosted: verify image is available in local Docker registry
              if docker images --filter reference="$CIUX_IMAGE_URL" --format "{{.Repository}}:{{.Tag}}" | grep -q "$CIUX_IMAGE_URL"; then
                echo "Image $CIUX_IMAGE_URL found in local Docker registry"
                docker images --filter reference="$CIUX_IMAGE_URL"
              else
                echo "Error: image $CIUX_IMAGE_URL not found in local Docker registry"
                echo "Available images:"
                docker images
                exit 1
              fi
            elif [ -f artifacts/image.tar ]; then
              # GHA setup
              echo "Loading image $CIUX_IMAGE_URL from archive"
              docker load --input artifacts/image.tar
            else
              echo "Error: no image source available, artifacts/image.tar not found"
              exit 1
            fi
          else
            echo "Using existing remote image $CIUX_IMAGE_URL"
          fi
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          registry: gitlab-registry.in2p3.fr
          username: ${{ secrets.registry_username }}
          password: ${{ secrets.registry_token }}
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21.4'
      - name: Install ciux
        run: go install github.com/k8s-school/ciux@"${{ env.CIUX_VERSION }}"
      - name: Push image to official registry
        run: |
          ./push-image.sh
      - uses: act10ns/slack@v1
        with:
          webhook-url: ${{ secrets.slack_webhook_url }}
          status: ${{ job.status }}
        if: always()
  cleanup:
    name: Cleanup old Docker images
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: [build, integration-tests, image-analysis, push]
    if: ${{ success() && contains(fromJSON(inputs.runner), 'self-hosted') }}
    steps:
      - name: Cleanup old fink-broker images
        run: |
          echo "Cleaning up fink-broker images older than 5 days"

          # Get current date in seconds since epoch
          current_date=$(date +%s)
          five_days_ago=$((current_date - 5*24*60*60))

          # Find and remove fink-broker images older than 5 days
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.CreatedAt}}\t{{.ID}}" | grep fink-broker | while read repo tag created id rest; do
            # Parse the created date
            created_seconds=$(date -d "$created" +%s 2>/dev/null || echo 0)

            if [ $created_seconds -lt $five_days_ago ] && [ $created_seconds -gt 0 ]; then
              echo "Removing old image: $repo:$tag (created: $created)"
              docker rmi "$id" 2>/dev/null || echo "Failed to remove image $id (may be in use)"
            else
              echo "Keeping recent image: $repo:$tag (created: $created)"
            fi
          done

          # Clean up dangling images
          echo "Cleaning up dangling images"
          docker image prune -f

          # Show remaining images for verification
          echo "Remaining fink-broker images:"
          docker images | grep fink-broker || echo "No fink-broker images found"

